services:
  - type: web
    name: cti-guard-backend
    runtime: node
    region: oregon          # Render free-tier default; change to match your users

    buildCommand: npm ci --omit=dev
    startCommand: node server.js

    healthCheckPath: /health

    envVars:
      # ---------- runtime ----------
      - key: NODE_ENV
        value: production

      # ---------- secrets (set values in Render dashboard) ----------
      - key: MONGODB_URI
        sync: false         # paste your Atlas connection string in the dashboard

      - key: JWT_SECRET
        generateValue: true # Render generates a secure random value automatically

      - key: JWT_EXPIRES_IN
        value: 24h

      # ---------- CORS (set to your Vercel frontend URL) ----------
      - key: CORS_ORIGIN
        sync: false         # e.g. https://cti-guard.vercel.app
